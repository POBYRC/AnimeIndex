<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<title>เพิ่มอนิเมะใหม่ | จัดการคลังอนิเมะ</title>
<style>
body {
  font-family: 'Prompt', sans-serif;
  background: #f8fafc;
  padding: 20px;
  color: #2d3748;
  max-width: 800px;
  margin: auto;
}
h1 {
  color: #2b6cb0;
  text-align: center;
  margin-bottom: 10px;
}
h2 {
  text-align: center;
  color: #4a5568;
  font-size: 18px;
}
.card {
  background: white;
  border-radius: 16px;
  padding: 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  margin-top: 20px;
}
input, textarea, select {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 10px;
  border: 1px solid #cbd5e0;
  font-size: 15px;
}
button {
  background: #2b6cb0;
  color: white;
  border: none;
  padding: 10px 20px;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 10px;
  transition: all 0.2s ease;
}
button:hover {
  background: #2c5282;
  transform: translateY(-1px);
}
.category-list {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 5px;
}
.category-list label {
  background: #edf2f7;
  padding: 6px 12px;
  border-radius: 15px;
  cursor: pointer;
  transition: 0.2s;
}
.category-list label:hover {
  background: #e2e8f0;
}
.category-list input {
  margin-right: 6px;
}
.output-mode {
  display: flex;
  justify-content: center;
  gap: 20px;
  background: #edf2f7;
  padding: 10px;
  border-radius: 10px;
  margin-top: 20px;
}
.output-mode label {
  font-weight: bold;
  cursor: pointer;
  color: #2d3748;
}
.output-mode input {
  margin-right: 6px;
}
#outputBox {
  margin-top: 15px;
  height: 300px;
  white-space: pre;
  font-family: monospace;
  background: #fff;
  border: 1px solid #cbd5e0;
  border-radius: 10px;
  padding: 10px;
}
#animeList {
  margin-top: 20px;
  background: #fff;
  border-radius: 12px;
  padding: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}
</style>
</head>
<body>

<h1>📝 เพิ่มอนิเมะใหม่</h1>
<h2 id="loadStatus">📂 กำลังโหลดข้อมูล...</h2>

<div class="card">
  <label>ชื่ออนิเมะ:</label>
  <input id="title" placeholder="เช่น โทนิกาคุคาวาอี้">

  <label>ลิงก์อนิเมะ:</label>
  <input id="link" placeholder="เช่น https://animeyuzu.com/...">

  <label>หมวดหมู่:</label>
  <div class="category-list" id="categoryList">กำลังโหลด...</div>

  <label>ลิงก์รูปภาพ:</label>
  <input id="image" placeholder="เช่น https://cdn.myanimelist.net/images/anime/...jpg">

  <div class="output-mode">
    <label><input type="radio" name="outputType" value="code" checked> แสดงเป็นโค้ด JSON</label>
    <label><input type="radio" name="outputType" value="file"> ดาวน์โหลดเป็นไฟล์ JSON</label>
  </div>

  <div style="text-align:center;">
    <button onclick="addAnime()">➕ เพิ่มลงรายการ</button>
  </div>
</div>

<div id="animeList"></div>

<div class="card">
  <h3>📜 ข้อมูล JSON ที่อัปเดตแล้ว:</h3>
  <textarea id="outputBox" readonly></textarea>
  <button onclick="copyJSON()">📎 คัดลอกทั้งหมด</button>
</div>

<script>
let animeData = [];
let allCategories = new Set();

// ✅ โหลดข้อมูล JSON เดิม
fetch('anime_data.json')
  .then(res => res.json())
  .then(data => {
    animeData = data;
    document.getElementById('loadStatus').textContent = `✅ โหลดข้อมูลสำเร็จ (${animeData.length} เรื่อง)`;
    allCategories = new Set(animeData.flatMap(a => a.category));
    renderCategoryList();
    renderList();
    updateOutput();
  })
  .catch(err => {
    document.getElementById('loadStatus').textContent = "⚠️ ไม่พบ anime_data.json (จะเริ่มใหม่)";
    animeData = [];
  });

// ✅ แสดงหมวดหมู่จาก JSON
function renderCategoryList() {
  const container = document.getElementById('categoryList');
  container.innerHTML = '';
  [...allCategories].sort().forEach(cat => {
    const label = document.createElement('label');
    label.innerHTML = `<input type="checkbox" value="${cat}"> ${cat}`;
    container.appendChild(label);
  });
}

// ✅ เพิ่มอนิเมะใหม่
function addAnime() {
  const title = document.getElementById('title').value.trim();
  const link = document.getElementById('link').value.trim();
  const image = document.getElementById('image').value.trim();
  const categories = [...document.querySelectorAll('#categoryList input:checked')].map(c => c.value);
  const outputType = document.querySelector('input[name="outputType"]:checked').value;

  if (!title || !link) {
    alert('กรุณากรอกชื่อและลิงก์อย่างน้อย');
    return;
  }

  const newAnime = {
    id: animeData.length > 0 ? Math.max(...animeData.map(a => a.id)) + 1 : 1,
    title,
    link,
    category: categories,
    image
  };

  animeData.push(newAnime);
  renderList();
  updateOutput();
  clearForm();

  if (outputType === "file") {
    downloadJSON();
  } else {
    alert("✅ เพิ่มเรียบร้อยแล้ว! ข้อมูลอัปเดตด้านล่าง");
  }
}

// ✅ แสดงรายการทั้งหมด
function renderList() {
  const list = document.getElementById('animeList');
  if (animeData.length === 0) {
    list.innerHTML = '<p>ยังไม่มีข้อมูล</p>';
    return;
  }
  list.innerHTML = '<h3>📚 รายการทั้งหมด:</h3>' + animeData.map(a =>
    `<div>🎬 <b>${a.title}</b> (${a.category.join(', ')})</div>`
  ).join('');
}

// ✅ แสดง JSON รวมทั้งหมด
function updateOutput() {
  document.getElementById('outputBox').value = JSON.stringify(animeData, null, 2);
}

// ✅ ล้างช่องกรอก
function clearForm() {
  document.getElementById('title').value = '';
  document.getElementById('link').value = '';
  document.getElementById('image').value = '';
  document.querySelectorAll('#categoryList input').forEach(c => c.checked = false);
}

// ✅ คัดลอกทั้งหมด
function copyJSON() {
  const text = document.getElementById('outputBox').value;
  navigator.clipboard.writeText(text).then(() => alert("📋 คัดลอก JSON แล้ว!"));
}

// ✅ ดาวน์โหลด JSON
function downloadJSON() {
  const blob = new Blob([JSON.stringify(animeData, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'anime_data.json';
  a.click();
  URL.revokeObjectURL(url);
}
</script>

</body>
</html>

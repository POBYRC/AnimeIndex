<body>

<!-- 🌌 Video Background (kept) -->
<video id="bgVideo" autoplay muted loop playsinline preload="auto"></video>

<h1>AnimeIndex</h1>

<div class="controls">
  <input type="text" id="searchBox" class="search-box" placeholder="🔍 ค้นหาชื่ออนิเมะ...">

<!-- category-container ถูกซ่อนสำหรับหน้า H -->

<p class="count" id="animeCount" style="display:none;"></p>
<div class="grid" id="animeGrid" style="display:none;"></div>

<footer>
  © 2025 Anime List | สร้างโดย <a href="#">Wesley</a>

  <!-- เพิ่มปุ่ม Background จาก index เพื่อเปิด modal เปลี่ยนพื้นหลัง -->

    <button id="openBackground" class="allsite-link">Background</button>

  </div>
</footer>

<!-- Background Modal (copied from index) -->
<div id="bgModal" class="modal-backdrop" aria-hidden="true">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal-title">🎨 เลือกพื้นหลัง</div>
    <div id="bgOptions" style="display:flex;flex-direction:column;gap:10px;"></div>
    <button id="bgCancelBtn" class="btn-modal ghost">ยกเลิก</button>
  </div>
</div>

<script>
// =======================
// Background system copied from index.html and adapted for Hindex
// - Replaces the previous simple background loader with the full modal + caching system
// - If the user previously saved a background it will be loaded; otherwise default repoVideo is used
// =======================

const backgroundSources = [
  { type: 'repo', label: 'YouCut.webm', value: 'YouCut.webm' },
  { type: 'repo', label: '11_10_Homescreen_GameChangers.webm', value: '11_10_Homescreen_GameChangers.webm' },
  { type: 'repo', label: '11_05_Homescreen_VCT.webm', value: '11_05_Homescreen_VCT.webm' }
];

// default video when no saved background exists
const repoVideo = "YouCut.webm";

const bgModal = document.getElementById('bgModal');
const openBackground = document.getElementById('openBackground');
const bgOptions = document.getElementById('bgOptions');
const bgVideoEl = document.getElementById('bgVideo');
const bgCancelBtn = document.getElementById('bgCancelBtn');

function renderBgOptions(){
  if (!bgOptions) return;
  bgOptions.innerHTML = '';
  backgroundSources.forEach(bg=>{
    const btn = document.createElement('button');
    btn.classList.add('btn-modal');
    btn.textContent = bg.label;
    btn.onclick = ()=> selectBackground(bg);
    bgOptions.appendChild(btn);
  });
}

if (openBackground) {
  openBackground.addEventListener('click', (e)=>{
    e.preventDefault();
    renderBgOptions();
    if (bgModal) bgModal.classList.add('show');
  });
} else {
  console.warn('openBackground element not found; modal cannot be opened.');
}

if (bgCancelBtn) {
  bgCancelBtn.addEventListener('click', ()=> bgModal && bgModal.classList.remove('show'));
}
if (bgModal) {
  bgModal.addEventListener('click',(e)=>{ if(e.target===bgModal) bgModal.classList.remove('show'); });
}

// IndexedDB helpers for background caching
function getDB() {
  return new Promise((resolve, reject) => {
    const open = indexedDB.open("bgDB", 1);
    open.onupgradeneeded = () => {
      try { open.result.createObjectStore("backgrounds"); } catch(e){ /* ignore if exists */ }
    };
    open.onsuccess = () => resolve(open.result);
    open.onerror = () => reject(open.error);
  });
}

async function saveToCache(key, blob) {
  const db = await getDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction("backgrounds", "readwrite");
    const store = tx.objectStore("backgrounds");
    const req = store.put(blob, key);
    req.onsuccess = () => {
      tx.oncomplete = () => resolve(true);
    };
    req.onerror = () => reject(req.error);
  });
}

async function loadFromCache(key) {
  const db = await getDB();
  return new Promise((resolve) => {
    const tx = db.transaction("backgrounds", "readonly");
    const req = tx.objectStore("backgrounds").get(key);
    req.onsuccess = () => resolve(req.result || null);
    req.onerror = () => resolve(null);
  });
}

// Background selection / loading
function selectBackground(bgData){
  try {
    localStorage.setItem('bgSource', JSON.stringify(bgData));
  } catch(e){
    console.warn('Could not save bgSource to localStorage', e);
  }
  loadNewBackground(bgData);
  if (bgModal) bgModal.classList.remove('show');
}

(async function loadSavedBg(){
  try {
    const saved = localStorage.getItem('bgSource');
    if(saved) {
      await loadNewBackground(JSON.parse(saved));
    } else {
      // no saved background — load default repo video
      await loadNewBackground({ value: repoVideo });
    }
  } catch(e){
    console.warn('Error loading saved background', e);
    // fallback to repoVideo
    loadNewBackground({ value: repoVideo }).catch(()=>{});
  }
})();

async function loadNewBackground(bgData){
  if(!bgData) return;
  const source = bgData.value;
  try {
    const cachedBlob = await loadFromCache(source);
    if (cachedBlob) {
      bgVideoEl.src = URL.createObjectURL(cachedBlob);
      await bgVideoEl.play().catch(()=>{});
      return;
    }
    const res = await fetch(source);
    if(!res.ok) throw new Error('Fetch failed: ' + res.status);
    const blob = await res.blob();
    // save to cache (don't block UI if save fails)
    saveToCache(source, blob).catch(e=>console.warn('Background cache save failed', e));
    bgVideoEl.src = URL.createObjectURL(blob);
    await bgVideoEl.play().catch(()=>{});
  } catch(err){
    console.warn("Background load failed, using source directly", err);
    // fallback: set src to source (may be CORS/404 but still a fallback)
    bgVideoEl.src = source;
    try { await bgVideoEl.play().catch(()=>{}); } catch(e){}
  }
}
</script>

<script>
// =======================
// 🔹 Fetch H.json and render list (kept from original file)
// =======================
let allAnimes = [];

fetch('H.json')
  .then(response => response.json())
  .then(animes => {
    allAnimes = animes;
    const grid = document.getElementById('animeGrid');
    const searchBox = document.getElementById('searchBox');
    const countText = document.getElementById('animeCount');
    const loader = document.getElementById('loader');

    // ซ่อน loader และแสดง grid + count
    loader.style.display = 'none';
    grid.style.display = 'grid';
    countText.style.display = 'block';

    function renderAnimeList(list){
      grid.innerHTML = '';
      countText.textContent = `พบทั้งหมด ${list.length} เรื่อง`;
      if(list.length===0){
        grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;">ไม่พบอนิเมะ 😢</p>';
        return;
      }
      list.forEach(a=>{
        const animeDiv = document.createElement('div');
        animeDiv.classList.add('anime');
        const imgSrc = a.image || 'https://upload.wikimedia.org/wikipedia/commons/6/6a/JavaScript-logo.png';
        // ไม่แสดงแท็กหมวดหมู่ทั้งสิ้น — แม้ใน JSON จะมี category
        animeDiv.innerHTML = `
          <a href="${a.link}" target="_blank" rel="noopener noreferrer">
            <img src="${imgSrc}" alt="${a.title}">
            <div class="anime-title">${a.title}</div>
          </a>
        `;
        grid.appendChild(animeDiv);
      });
    }

    function applyFilters(){
      const keyword = searchBox.value.toLowerCase();
      let filtered = animes;
      if(keyword){
        filtered = filtered.filter(a=>a.title.toLowerCase().includes(keyword));
      }
      renderAnimeList(filtered);
    }

    searchBox.addEventListener('input',applyFilters);

    document.getElementById('randomButton').addEventListener('click',()=>{
      if(allAnimes.length===0) return;
      const randomAnime = allAnimes[Math.floor(Math.random()*allAnimes.length)];
      if(randomAnime && randomAnime.link) window.open(randomAnime.link,'_blank');
    });

    document.getElementById('scrollTop').addEventListener('click', e=>{
      e.preventDefault();
      window.scrollTo({top:0,behavior:'smooth'});
    });

    renderAnimeList(animes);
  })
  .catch(err=>{
    document.getElementById('loader').innerHTML = '<p style="text-align:center;">ไม่สามารถโหลดข้อมูลได้ 😢</p>';
    console.error('โหลด H.json ไม่ได้:', err);
  });
</script>

<script>
// ✅ Mobile adjustments (kept)
function isMobileDevice() {
  const ua = navigator.userAgent.toLowerCase();
  return /android|iphone|ipad|ipod|mobile/.test(ua);
}

function adjustForMobile() {
  document.body.style.zoom = "0.9";
  document.body.style.padding = "10px";
  document.body.style.overflowX = "hidden";

  const grid = document.querySelector('.grid');
  if (grid) grid.style.gridTemplateColumns = "repeat(auto-fill, minmax(150px, 1fr))";

  document.querySelectorAll('.anime img').forEach(img => {
    img.style.height = "220px";
  });

  document.querySelectorAll('.anime-title').forEach(title => {
    title.style.fontSize = "13px";
  });

  document.querySelectorAll('.tag').forEach(tag => {
    tag.style.fontSize = "11px";
  });

  console.log("📱 Mobile detected — UI adjusted for small screen");
}

window.addEventListener('DOMContentLoaded', () => {
  if (isMobileDevice()) {
    adjustForMobile();
  } else {
    console.log("💻 Desktop detected — using default layout");
  }
});
</script>

<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<title>Anime Manager Kawaii ✨</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- 🩷 FAVICON -->
<link rel="icon" type="image/png" href="https://raw.githubusercontent.com/POBYRC/AnimeIndex/refs/heads/main/1.png">

<style>
body {
  font-family: "Prompt", sans-serif;
  background: #fdfdff;
  margin: 0;
  padding: 20px;
  color: #333;
}
h1 {
  text-align: center;
  color: #6b46c1;
  margin-bottom: 20px;
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 20px;
}
.anime-card {
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.1);
  padding: 10px;
  text-align: center;
  transition: transform 0.2s;
}
.anime-card:hover { transform: scale(1.05); }
.anime-card img {
  width: 100%;
  height: 180px;
  border-radius: 12px;
  object-fit: cover;
}
.anime-title {
  margin: 10px 0;
  color: #553c9a;
  font-weight: bold;
}
button.edit-btn {
  background: #d6bcfa;
  border: none;
  border-radius: 10px;
  padding: 6px 10px;
  cursor: pointer;
  transition: 0.2s;
}
button.edit-btn:hover { background: #b794f4; color: white; }

/* 🩷 Modal */
.modal {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(3px);
  justify-content: center;
  align-items: center;
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn {
  from { opacity: 0; } to { opacity: 1; }
}
.modal-content {
  background: #fff;
  border-radius: 16px;
  padding: 20px;
  width: 90%;
  max-width: 400px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  animation: popUp 0.3s ease;
}
@keyframes popUp {
  from { transform: scale(0.8); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
.modal h2 {
  color: #6b46c1;
  text-align: center;
}
.modal input {
  width: 100%;
  padding: 8px;
  border: 1px solid #ddd;
  border-radius: 10px;
  margin-bottom: 10px;
}
.category-list {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}
.category-list label {
  background: #f3e8ff;
  border-radius: 10px;
  padding: 4px 10px;
  font-size: 13px;
  cursor: pointer;
}
.category-list input {
  margin-right: 4px;
}
.modal-buttons {
  text-align: center;
  margin-top: 10px;
}
button.save-btn, button.cancel-btn {
  border: none;
  padding: 8px 16px;
  border-radius: 10px;
  cursor: pointer;
  margin: 5px;
  font-weight: bold;
}
.save-btn { background: #9f7aea; color: white; }
.save-btn:hover { background: #805ad5; }
.cancel-btn { background: #e2e8f0; }
.cancel-btn:hover { background: #cbd5e0; }

/* 🌸 Loading */
.loading {
  text-align: center;
  color: #805ad5;
  font-size: 18px;
  margin-top: 40px;
  animation: blink 1.2s infinite;
}
@keyframes blink {
  50% { opacity: 0.6; }
}
</style>
</head>
<body>
<h1>จัดการคลังอนิเมะของฉัน 🎀</h1>

<p id="status" class="loading">กำลังโหลดข้อมูล...</p>
<div class="grid" id="animeGrid" style="display:none;"></div>

<!-- 💕 Modal -->
<div id="editModal" class="modal">
  <div class="modal-content">
    <h2>แก้ไขอนิเมะ</h2>
    <input type="text" id="editTitle" placeholder="ชื่อเรื่อง">
    <input type="text" id="editLink" placeholder="ลิงก์อนิเมะ">
    <input type="text" id="editImage" placeholder="URL รูปภาพ">
    <div class="category-list" id="editCategories"></div>
    <div class="modal-buttons">
      <button class="save-btn">บันทึก</button>
      <button class="cancel-btn">ยกเลิก</button>
    </div>
  </div>
</div>

<script>
let animes = [];
let editIndex = null;
const grid = document.getElementById('animeGrid');
const modal = document.getElementById('editModal');
const statusText = document.getElementById('status');

// ✅ โหลด JSON (พร้อมจับ error)
fetch('anime_data.json', { cache: "no-store" })
  .then(res => {
    if (!res.ok) throw new Error("โหลดไม่สำเร็จ");
    return res.json();
  })
  .then(data => {
    animes = data;
    statusText.style.display = 'none';
    grid.style.display = 'grid';
    renderAnimes();
  })
  .catch(err => {
    statusText.textContent = "❌ โหลดข้อมูลไม่สำเร็จ กรุณาตรวจสอบไฟล์ anime_data.json";
    console.error(err);
  });

// ✅ แสดงรายการอนิเมะ
function renderAnimes() {
  grid.innerHTML = '';
  animes.forEach((a, i) => {
    const card = document.createElement('div');
    card.className = 'anime-card';
    card.innerHTML = `
      <img src="${a.image || 'https://upload.wikimedia.org/wikipedia/commons/6/6a/JavaScript-logo.png'}" alt="${a.title}">
      <div class="anime-title">${a.title}</div>
      <button class="edit-btn" onclick="openModal(${i})">แก้ไข</button>
    `;
    grid.appendChild(card);
  });
}

// ✅ เปิด Modal แก้ไข
function openModal(index) {
  editIndex = index;
  const anime = animes[index];
  document.getElementById('editTitle').value = anime.title;
  document.getElementById('editLink').value = anime.link;
  document.getElementById('editImage').value = anime.image || '';

  // ดึงหมวดหมู่ทั้งหมดจาก JSON
  const allCategories = [...new Set(animes.flatMap(a => a.category))].sort();
  const container = document.getElementById('editCategories');
  container.innerHTML = '';
  allCategories.forEach(cat => {
    const label = document.createElement('label');
    const checked = anime.category.includes(cat) ? 'checked' : '';
    label.innerHTML = `<input type="checkbox" value="${cat}" ${checked}> ${cat}`;
    container.appendChild(label);
  });

  modal.style.display = 'flex';
}

// ✅ ปิด Modal
document.querySelector('.cancel-btn').onclick = () => {
  modal.style.display = 'none';
};

// ✅ บันทึกข้อมูลที่แก้ไข
document.querySelector('.save-btn').onclick = () => {
  const anime = animes[editIndex];
  anime.title = document.getElementById('editTitle').value.trim();
  anime.link = document.getElementById('editLink').value.trim();
  anime.image = document.getElementById('editImage').value.trim();

  const selectedCats = [...document.querySelectorAll('#editCategories input:checked')].map(c => c.value);
  anime.category = selectedCats;

  renderAnimes();
  modal.style.display = 'none';
};

// ✅ ปิด modal เมื่อคลิกนอกกล่อง
window.onclick = (e) => {
  if (e.target === modal) modal.style.display = 'none';
};
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<title>AnimeIndex</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link id="dynamicFavicon" rel="icon" type="image/png" href="">
<script>
  const faviconList = {
    1: "",
    2: "",
    3: "",
    4: "",
  };
  const currentFavicon = 3;
  const faviconElement = document.getElementById("dynamicFavicon");
  if (faviconList[currentFavicon]) faviconElement.href = faviconList[currentFavicon];
</script>

<style>
body {font-family:'Prompt',sans-serif;background:#f8fafc;color:#2d3748;padding:20px;display:flex;flex-direction:column;min-height:100vh;}
#bgVideo{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:-1;opacity:0.95;}
h1{text-align:center;color:#2b6cb0;margin-bottom:20px;}
.controls{display:flex;justify-content:center;gap:10px;margin-bottom:20px;}
.search-box{padding:8px 12px;border-radius:8px;border:1px solid #cbd5e0;font-size:16px;min-width:200px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:20px;}
.anime{background:white;border-radius:12px;box-shadow:0 2px 6px rgba(0,0,0,0.1);overflow:hidden;text-align:center;transition:transform 0.2s;}
.anime:hover{transform:scale(1.05);}
.anime img{width:100%;height:350px;object-fit:cover;}
.anime-title{padding:10px;font-size:14px;color:#2b6cb0;font-weight:bold;}
.count{text-align:center;color:#4a5568;margin-bottom:15px;}
#loader{display:flex;justify-content:center;align-items:center;flex:1;}
.spinner{width:60px;height:60px;border:6px solid #cbd5e0;border-top-color:#2b6cb0;border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
footer{text-align:center;padding:10px;margin-top:auto;font-size:14px;color:#4a5568;}
#randomButton{background:#2b6cb0;color:white;border:none;border-radius:20px;padding:8px 16px;cursor:pointer;font-size:14px;}
</style>
</head>
<body>

<video id="bgVideo" autoplay muted loop></video>

<h1>AnimeIndex</h1>

<div class="controls">
  <input type="text" id="searchBox" class="search-box" placeholder="🔍 ค้นหาชื่ออนิเมะ...">
  <button id="randomButton">สุ่มอนิเมะ</button>
</div>

<div id="loader"><div class="spinner"></div></div>
<p class="count" id="animeCount" style="display:none;"></p>
<div class="grid" id="animeGrid" style="display:none;"></div>

<footer>© 2025 Anime List | Wesley</footer>

<script>
let allAnimes = [];

fetch('H.json')
  .then(r => r.json())
  .then(animes => {
    allAnimes = animes;
    const grid = document.getElementById('animeGrid');
    const searchBox = document.getElementById('searchBox');
    const countText = document.getElementById('animeCount');

    document.getElementById('loader').style.display = 'none';
    grid.style.display = 'grid';
    countText.style.display = 'block';

    function render(list){
      grid.innerHTML='';
      countText.textContent = `พบทั้งหมด ${list.length} เรื่อง`;
      list.forEach(a=>{
        const img = a.image || '';
        const div = document.createElement('div');
        div.className='anime';
        div.innerHTML = `
          <a href="${a.link}" target="_blank">
            <img src="${img}">
            <div class="anime-title">${a.title}</div>
          </a>
        `;
        grid.appendChild(div);
      });
    }

    function applyFilters(){
      const key = searchBox.value.toLowerCase();
      const filtered = animes.filter(a => a.title.toLowerCase().includes(key));
      render(filtered);
    }

    searchBox.addEventListener('input', applyFilters);

    document.getElementById('randomButton').addEventListener('click',()=>{
      const r = allAnimes[Math.floor(Math.random()*allAnimes.length)];
      window.open(r.link,'_blank');
    });

    render(animes);
  })
  .catch(err=>{
    document.getElementById('loader').innerHTML='<p>โหลดข้อมูลไม่ได้</p>';
  });
</script>

</body>
</html>

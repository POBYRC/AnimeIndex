<style>
body {
  font-family: 'Prompt', sans-serif;
  background:#f8fafc;
  color:#2d3748;
  padding:20px;
}
h1 {
  text-align:center;
  color:#2b6cb0;
  margin-bottom:20px;
}
.controls {
  display:flex;
  justify-content:center;
  align-items:center;
  flex-wrap:wrap;
  gap:10px;
  margin-bottom:20px;
}
.search-box {
  padding:8px 12px;
  border-radius:8px;
  border:1px solid #cbd5e0;
  font-size:16px;
  min-width:200px;
}
.category-container {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
  margin-bottom:15px;
}
.category-button {
  background:#edf2f7;
  color:#2d3748;
  border:none;
  border-radius:20px;
  padding:6px 14px;
  cursor:pointer;
  transition:all 0.2s;
  font-size:14px;
}
.category-button:hover {
  background:#e2e8f0;
}
.category-button.active {
  background:#2b6cb0;
  color:white;
  box-shadow:0 0 6px rgba(43,108,176,0.6);
}
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:20px;
}
.anime {
  background:white;
  border-radius:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
  overflow:hidden;
  text-align:center;
  transition:transform 0.2s;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}
.anime:hover { transform:scale(1.05); }
.anime img {
  width:100%;
  height:250px;
  object-fit:cover;
}
.anime-title {
  padding:10px;
  font-size:14px;
  color:#2b6cb0;
  font-weight:bold;
  min-height:40px;
}
.tags {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:6px;
  padding:0 8px 10px 8px;
}
.tag {
  background:#e2e8f0;
  color:#2d3748;
  border-radius:12px;
  padding:3px 8px;
  font-size:12px;
}
.count {
  text-align:center;
  color:#4a5568;
  margin-bottom:15px;
}
</style>
</head>
<body>
<h1>คลังอนิเมะของฉัน</h1>

<div class="controls">
  <input type="text" id="searchBox" class="search-box" placeholder="🔍 ค้นหาชื่ออนิเมะ...">
</div>
<div class="category-container" id="categoryContainer"></div>
<p class="count" id="animeCount"></p>
<div class="grid" id="animeGrid"></div>

<script>
let allAnimes = [];
let activeCategories = [];

fetch('anime_data.json')
  .then(response => response.json())
  .then(animes => {
    allAnimes = animes;
    const grid = document.getElementById('animeGrid');
    const categoryContainer = document.getElementById('categoryContainer');
    const searchBox = document.getElementById('searchBox');
    const countText = document.getElementById('animeCount');

    // ✅ สร้างปุ่มหมวดหมู่ทั้งหมด
    const categories = [...new Set(animes.flatMap(a => a.category))].sort();
    categories.forEach(cat => {
      const btn = document.createElement('button');
      btn.classList.add('category-button');
      btn.textContent = cat;
      btn.addEventListener('click', () => {
        btn.classList.toggle('active');
        if (activeCategories.includes(cat)) {
          activeCategories = activeCategories.filter(c => c !== cat);
        } else {
          activeCategories.push(cat);
        }
        applyFilters();
      });
      categoryContainer.appendChild(btn);
    });

    // ✅ ฟังก์ชันแสดงอนิเมะ
    function renderAnimeList(list) {
      grid.innerHTML = '';
      countText.textContent = `พบทั้งหมด ${list.length} เรื่อง`;
      if (list.length === 0) {
        grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;">ไม่พบอนิเมะ 😢</p>';
        return;
      }

      list.forEach(a => {
        const animeDiv = document.createElement('div');
        animeDiv.classList.add('anime');
        const imgSrc = a.image || 'https://upload.wikimedia.org/wikipedia/commons/6/6a/JavaScript-logo.png';
        const tagsHTML = a.category.map(cat => `<span class="tag">${cat}</span>`).join('');
        animeDiv.innerHTML = `
          <a href="${a.link}" target="_blank">
            <img src="${imgSrc}" alt="${a.title}">
            <div class="anime-title">${a.title}</div>
          </a>
          <div class="tags">${tagsHTML}</div>
        `;
        grid.appendChild(animeDiv);
      });
    }

    // ✅ ฟังก์ชันกรองข้อมูล (AND Logic)
    function applyFilters() {
      const keyword = searchBox.value.toLowerCase();
      let filtered = animes;

      if (activeCategories.length > 0) {
        filtered = filtered.filter(a =>
          activeCategories.every(cat => a.category.includes(cat))
        );
      }
      if (keyword) {
        filtered = filtered.filter(a => a.title.toLowerCase().includes(keyword));
      }
      renderAnimeList(filtered);
    }

    // ✅ ค้นหาด้วยชื่อ
    searchBox.addEventListener('input', applyFilters);

    renderAnimeList(animes);
  })
  .catch(err => {
    document.getElementById('animeGrid').innerHTML = '<p style="text-align:center;">ไม่สามารถโหลดข้อมูลได้ 😢</p>';
    console.error('โหลด anime_data.json ไม่ได้:', err);
  });
</script>
</body>
</html>

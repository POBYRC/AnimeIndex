<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<title>คลังอนิเมะของฉัน</title>
<style>
body {font-family: 'Prompt', sans-serif; background:#f8fafc; color:#2d3748; padding:20px;}
h1 {text-align:center; color:#2b6cb0; margin-bottom:20px;}
.grid {display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:20px;}
.anime {background:white; border-radius:12px; box-shadow:0 2px 6px rgba(0,0,0,0.1); overflow:hidden; text-align:center; transition:transform 0.2s;}
.anime:hover {transform:scale(1.05);}
.anime img {width:100%; height:250px; object-fit:cover;}
.anime-title {padding:10px; font-size:14px; color:#2b6cb0;}
</style>
</head>
<body>
<h1>คลังอนิเมะของฉัน</h1>
<div class="grid" id="animeGrid"></div>

<script>
fetch('anime_data.json')
  .then(response => response.json())
  .then(animes => {
    const grid = document.getElementById('animeGrid');
    animes.forEach(a => {
      const animeDiv = document.createElement('div');
      animeDiv.classList.add('anime');
      animeDiv.innerHTML = `
        <a href="${a.link}" target="_blank">
          <img src="https://upload.wikimedia.org/wikipedia/commons/6/6a/JavaScript-logo.png" alt=" ${a.title} ">
          <div class="anime-title"> ${a.title} </div>
        </a>
      `;
      grid.appendChild(animeDiv);
    });
  })
  .catch(err => {
    document.getElementById('animeGrid').innerHTML = '<p style="text-align:center;">ไม่สามารถโหลดข้อมูลได้ 😢</p>';
    console.error('โหลด anime_data.json ไม่ได้:', err);
  });
</script>
</body>
</html>
